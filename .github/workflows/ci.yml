name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      POSTGRES_USER: build
      POSTGRES_PASSWORD: build
      POSTGRES_DB: build
      POSTGRES_HOST: "127.0.0.1"
      POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify application imports
        run: python -c "from src.main import app; assert app.title == 'Todo API'"

  lint:
    name: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check src tests

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Pytest with coverage
        run: |
          pytest tests \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=50

      - name: Coverage line rate from XML
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage.xml").getroot()
          rate = float(root.get("line-rate", "0")) * 100
          print(f"COVERAGE_LINE_RATE={rate:.2f}%")
          PY

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: app/htmlcov/

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: app/coverage.xml

  docker_build:
    name: docker_build
    runs-on: ubuntu-latest
    needs: [build, lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t lab1-app:ci -f app/Dockerfile ./app

      - name: Save image for push job
        run: mkdir -p image_export && docker save lab1-app:ci -o image_export/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tar
          path: image_export/

  docker_push:
    name: docker_push
    runs-on: ubuntu-latest
    needs: [docker_build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: image_export

      - name: Load image
        run: |
          set -eux
          TAR="$(find image_export -type f -name '*.tar' | head -n 1)"
          test -n "$TAR"
          docker load -i "$TAR"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -eux
          SHORT_SHA="${GIT_SHA:0:7}"
          IMAGE="naxeel/todo-api"
          docker tag lab1-app:ci "${IMAGE}:${SHORT_SHA}"
          docker tag lab1-app:ci "${IMAGE}:latest"
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"
